
<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
</head>
<body>
    <h1>Weather in Warsaw</h1>
    <p>Temperature: 0.2°C</p>
    <p>Last updated: 2026-03-04 20:18:50</p>
     <script>
        function updateTime() {
            const now = new Date();
            const options = { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                timeZone: 'Europe/Warsaw' 
            };
            const warsawTime = now.toLocaleTimeString([], options);
            document.getElementById('time').innerText = `Last updated: ${warsawTime}`;
        }

        // Update immediately and then every hour
        updateTime();
        setInterval(updateTime, 3600000); // every hour
    </script>
</body>
</html>
